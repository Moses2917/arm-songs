# nginx server block for Armenian Hymns (arm_songs)
# Copy to /etc/nginx/sites-available/ and symlink into sites-enabled/.

server {
    listen 80;
    server_name hymns.example.com;     # <-- change me

    client_max_body_size 10M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /srv/arm_songs/staticfiles/;     # STATIC_ROOT
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /srv/arm_songs/media/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://unix:/srv/arm_songs/run/arm_songs.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
