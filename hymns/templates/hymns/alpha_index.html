{% extends "base.html" %}
{% block nav_az %}active{% endblock %}
{% block content %}
<section class="container">
  <div class="page-head">
    <p class="eyebrow">{{ book_label }}</p>
    <h1>Այբենական</h1>
    <p class="sub">Երգերը ըստ սկզբնատառի · Ա–ից մինչև Օ</p>
  </div>

  <div class="book-switch">
    <a href="{% url 'hymns:alpha_index' %}?book=New" class="{% if book == 'New' %}active{% endif %}">Կարմիր Երգարան</a>
    <a href="{% url 'hymns:alpha_index' %}?book=Old" class="{% if book == 'Old' %}active{% endif %}">Word Songs</a>
  </div>

  <div class="az-grid">
    {% for letter in letters %}
      <a class="az-tile" href="{% url 'hymns:alpha_letter' letter=letter %}?book={{ book }}">{{ letter }}</a>
    {% endfor %}
  </div>
</section>
{% endblock %}
