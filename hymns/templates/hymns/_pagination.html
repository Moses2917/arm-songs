{% if page.has_other_pages %}
<nav class="pagination" aria-label="Pagination">
  {% if page.has_previous %}
    <a href="?page={{ page.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.book %}&book={{ request.GET.book }}{% endif %}">‹</a>
  {% else %}
    <span class="disabled">‹</span>
  {% endif %}

  <span class="current">{{ page.number }} / {{ page.paginator.num_pages }}</span>

  {% if page.has_next %}
    <a href="?page={{ page.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.book %}&book={{ request.GET.book }}{% endif %}">›</a>
  {% else %}
    <span class="disabled">›</span>
  {% endif %}
</nav>
{% endif %}
